services:
  headroom-proxy:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom-proxy
    restart: unless-stopped

    ports:
      - "127.0.0.1:8787:8787"

    environment:
      HEADROOM_HOST: "0.0.0.0"
      HEADROOM_TELEMETRY: "off"
      # Set your LLM provider key(s) as needed:
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # If proxying to a custom OpenAI-compatible endpoint, uncomment:
      # OPENAI_TARGET_API_URL: https://api.x.ai

    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
