services:
  headroom-proxy:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom-proxy
    restart: unless-stopped

    ports:
      - "127.0.0.1:8787:8787"

    env_file:
      - .env

    environment:
      HOME: /tmp/headroom-home
      HEADROOM_WORKSPACE_DIR: /tmp/headroom-home/.headroom
      HEADROOM_CONFIG_DIR: /tmp/headroom-home/.headroom/config

    volumes:
      - headroom-data:/tmp/headroom-home/.headroom

    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  headroom-data:
